syntax = "proto3";

package lgtbot;

message MessageItem
{
    oneof VariantItem
    {
        string text = 1;
        string image_path = 2;
        uint32 at_player_id = 3;
    }
}

message Acknowlegde
{
    bool ok = 1;
}

// ===========================
//  bot_core -> match_process
// ===========================

message NewGame
{
    uint32 match_id = 1;
    uint32 group_id = 2;  // the value of zero indicates that it is a private match
}

message SetCustomOptions
{
    string text = 1;
}

message StartGame
{
}

message ExecuteCommandRequest
{
    string text = 1;
    uint32 player_id = 2;
    bool is_public = 3;
}

message LeaveRequest
{
    uint32 player_id = 1;
}

message Request
{
    oneof VariantRequest
    {
        ExecuteCommandRequest execute_command = 1;
        LeaveRequest leave = 2;
    }
}

message ReplyMessage
{
    repeated MessageItem content = 1;
}

// ===========================
//  match_process -> bot_core
// ===========================

message PostMessage
{
    enum Type
    {
        TELL = 0;
        GROUP = 1;
        BROADCAST = 2;
        AI = 3;
    }
    Type type = 1;
    uint32 target_player_id = 2;  // only meaningful for TELL
    repeated MessageItem content = 3;
}

message FinsihGame
{
}
